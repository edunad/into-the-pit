<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Into the pit you go</title>
<style>
  :root{
    --bg:#000000; --surface:#1e1f22; --surface2:#303237;
    --ink:#f2f3f5; --mut:#949ba4; --dim:#6d6f78;
    --blurple:#5865f2; --blurple2:#4752c4; --warn:#f23f43;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);
    font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace}
  body{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 20px 44px}
  .frame{width:100%;max-width:600px}
  .viewport{position:relative;line-height:0}
  .viewport canvas{display:block;width:100%;height:auto}
  .intake{display:flex;gap:12px;margin-top:16px}
  .slot{flex:1;display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:4px;
    padding:11px 13px;cursor:pointer;transition:background .15s;min-width:0}
  .slot:hover,.slot.hot{background:var(--surface2)}
  .thumb{width:38px;height:38px;flex:none;border-radius:4px;background:#111214 center/cover no-repeat;
    background-image:repeating-conic-gradient(#2b2d31 0 25%,#1e1f22 0 50%);background-size:12px 12px}
  .slot-meta{display:flex;flex-direction:column;gap:3px;min-width:0}
  .slot-tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
  .slot-name{font-size:12px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .switch{flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:var(--surface);border-radius:4px;padding:0 15px;cursor:pointer;user-select:none;
    transition:background .15s}
  .switch:hover{background:var(--surface2)}
  .switch input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
  .sw-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);transition:color .15s}
  .sw-track{position:relative;width:34px;height:16px;border-radius:16px;background:#2b2d31;transition:background .15s}
  .sw-knob{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--mut);
    transition:transform .15s,background .15s}
  #cut:checked ~ .sw-label{color:var(--ink)}
  #cut:checked ~ .sw-track{background:var(--blurple)}
  #cut:checked ~ .sw-track .sw-knob{transform:translateX(18px);background:#fff}
  .go{border:0;border-radius:4px;font:inherit;font-weight:600;font-size:12px;letter-spacing:.06em;
    text-transform:uppercase;cursor:pointer;color:#fff;padding:0 24px;background:var(--blurple);
    transition:background .15s}
  .go:hover{background:var(--blurple2)}
  .go:disabled{background:#3a3c43;color:#72767d;cursor:default}
  .linkrow{display:flex;align-items:center;gap:12px;margin-top:12px;background:var(--surface);
    border-radius:4px;padding:0 13px;transition:background .15s}
  .linkrow:focus-within{background:var(--surface2)}
  .linkrow.err{background:#3a1618}
  .linktag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);flex:none}
  .linkin{flex:1;min-width:0;background:transparent;border:0;outline:none;color:var(--ink);
    font:inherit;font-size:12px;padding:13px 0;letter-spacing:.02em}
  .linkin::placeholder{color:var(--dim)}
  .bar{height:3px;background:#2b2d31;margin-top:12px;border-radius:3px;overflow:hidden;display:none}
  .bar span{display:block;height:100%;width:0;background:var(--blurple);transition:width .12s}
  @media(max-width:520px){.intake{flex-direction:column}.go{padding:13px}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="frame">
    <div class="viewport">
      <canvas id="cv"></canvas>
    </div>
    <div class="intake">
      <label class="slot" id="drop">
        <span class="thumb" id="thumb"></span>
        <span class="slot-meta">
          <span class="slot-tag">Subject</span>
          <span class="slot-name" id="subName">none</span>
        </span>
        <input type="file" id="file" accept="image/*" hidden>
      </label>
      <label class="switch" id="cutWrap" title="remove background">
        <input type="checkbox" id="cut" checked>
        <span class="sw-label">Cut BG</span>
        <span class="sw-track"><span class="sw-knob"></span></span>
      </label>
      <button class="go" id="export">Export GIF</button>
    </div>
    <div class="linkrow" id="linkrow">
      <span class="linktag">or link</span>
      <input id="link" class="linkin" type="text" spellcheck="false" autocomplete="off"
        placeholder="paste an image url & press enter">
    </div>
    <div class="bar" id="bar"><span id="barFill"></span></div>
  </div>

"use strict";

function medianCut(frames,w,h,maxColors){const samples=[];const total=w*h*frames.length;
  const step=Math.max(1,Math.floor(total/18000))*4;
  for(const f of frames){for(let i=0;i<f.length;i+=step)samples.push([f[i],f[i+1],f[i+2]]);}
  function box(px){let rmin=255,gmin=255,bmin=255,rmax=0,gmax=0,bmax=0;
    for(const p of px){if(p[0]<rmin)rmin=p[0];if(p[0]>rmax)rmax=p[0];
      if(p[1]<gmin)gmin=p[1];if(p[1]>gmax)gmax=p[1];if(p[2]<bmin)bmin=p[2];if(p[2]>bmax)bmax=p[2];}
    return{px:px,r:rmax-rmin,g:gmax-gmin,b:bmax-bmin};}
  let boxes=[box(samples)];
  while(boxes.length<maxColors){let bi=-1,br=-1;
    for(let i=0;i<boxes.length;i++){const b=boxes[i],m=Math.max(b.r,b.g,b.b);
      if(b.px.length>1&&m>br){br=m;bi=i;}}
    if(bi<0)break;const b=boxes[bi];const ch=b.r>=b.g&&b.r>=b.b?0:b.g>=b.b?1:2;
    b.px.sort((p,q)=>p[ch]-q[ch]);const mid=b.px.length>>1;
    boxes.splice(bi,1,box(b.px.slice(0,mid)),box(b.px.slice(mid)));}
  const pal=[];for(const b of boxes){let r=0,g=0,bb=0;
    for(const p of b.px){r+=p[0];g+=p[1];bb+=p[2];}const n=b.px.length||1;
    pal.push([Math.round(r/n),Math.round(g/n),Math.round(bb/n)]);}
  while(pal.length<maxColors)pal.push([0,0,0]);return pal;}
function mapFrame(f,w,h,pal,cache){const out=new Uint8Array(w*h);
  for(let i=0,j=0;j<w*h;i+=4,j++){const r=f[i],g=f[i+1],b=f[i+2];
    const key=((r>>3)<<10)|((g>>3)<<5)|(b>>3);let idx=cache[key];
    if(idx<0){let best=0,bd=1e9;for(let p=0;p<pal.length;p++){
      const dr=r-pal[p][0],dg=g-pal[p][1],db=b-pal[p][2],d=dr*dr+dg*dg+db*db;
      if(d<bd){bd=d;best=p;}}idx=best;cache[key]=idx;}out[j]=idx;}return out;}
function lzw(out,indices,minCode){out.push(minCode);
  const CLEAR=1<<minCode,EOI=CLEAR+1;let codeSize=minCode+1,next=EOI+1,dict=new Map();
  let block=[],buf=0,bits=0;
  function flushBlock(){out.push(block.length);for(const x of block)out.push(x);block=[];}
  function emit(code){buf|=code<<bits;bits+=codeSize;
    while(bits>=8){block.push(buf&0xFF);buf>>=8;bits-=8;if(block.length===255)flushBlock();}}
  emit(CLEAR);let prefix=indices[0];
  for(let i=1;i<indices.length;i++){const k=indices[i],key=prefix*256+k;
    if(dict.has(key)){prefix=dict.get(key);continue;}
    emit(prefix);
    if(next<4096){dict.set(key,next);if(next===(1<<codeSize)&&codeSize<12)codeSize++;next++;}
    else{emit(CLEAR);dict=new Map();codeSize=minCode+1;next=EOI+1;}
    prefix=k;}
  emit(prefix);emit(EOI);if(bits>0)block.push(buf&0xFF);if(block.length)flushBlock();out.push(0);}
function encodeGIF(w,h,frames,delayMs){const pal=medianCut(frames,w,h,256);
  const cache=new Int16Array(32768).fill(-1);const b=[];
  const s=t=>{for(let i=0;i<t.length;i++)b.push(t.charCodeAt(i));};
  const u16=v=>{b.push(v&0xFF,(v>>8)&0xFF);};
  s("GIF89a");u16(w);u16(h);b.push(0xF7,0,0);
  for(let i=0;i<256;i++)b.push(pal[i][0],pal[i][1],pal[i][2]);
  b.push(0x21,0xFF,0x0B);s("NETSCAPE2.0");b.push(0x03,0x01,0,0,0x00);
  const delay=Math.max(2,Math.round(delayMs/10));
  for(const f of frames){b.push(0x21,0xF9,0x04,0x04,delay&0xFF,(delay>>8)&0xFF,0x00,0x00);
    b.push(0x2C);u16(0);u16(0);u16(w);u16(h);b.push(0x00);
    lzw(b,mapFrame(f,w,h,pal,cache),8);}

let sub=null, subAsp=1, playing=true, t0=performance.now(), removeBg=true, lastImg=null, lastName="";

function clamp(v){return v<0?0:v>1?1:v;}
function smoothstep(a,b,x){if(x<=a)return 0;if(x>=b)return 1;const u=(x-a)/(b-a);return u*u*(3-2*u);}
function samp(a,i){const j=Math.max(0,Math.min(NF-1,i)),lo=Math.floor(j),hi=Math.min(lo+1,NF-1),w=j-lo;
  return a[lo]*(1-w)+a[hi]*w;}
function yprog(i){return (samp(CYN,i)-CYN[0])/((CYN[NF-1]-CYN[0])||1e-6);}

function cutout(img,tol){const c=document.createElement("canvas");
  c.width=img.naturalWidth;c.height=img.naturalHeight;
  const x=c.getContext("2d");x.drawImage(img,0,0);
  const W2=c.width,H2=c.height,d=x.getImageData(0,0,W2,H2),p=d.data;
  let hasA=false;for(let i=3;i<p.length;i+=4){if(p[i]<12){hasA=true;break;}}
  if(!hasA){const cs=[[0,0],[W2-1,0],[0,H2-1],[W2-1,H2-1]];let br=0,bg2=0,bb=0;
    for(const cc of cs){const o=(cc[1]*W2+cc[0])*4;br+=p[o];bg2+=p[o+1];bb+=p[o+2];}
    br/=4;bg2/=4;bb/=4;const t2=tol*tol;const seen=new Uint8Array(W2*H2),st=[];
    function push(px,py){if(px<0||py<0||px>=W2||py>=H2)return;const k=py*W2+px;if(seen[k])return;
      const o=k*4,dr=p[o]-br,dg=p[o+1]-bg2,db=p[o+2]-bb;
      if(dr*dr+dg*dg+db*db<t2){seen[k]=1;p[o+3]=0;st.push(k);}}
    for(let ix=0;ix<W2;ix++){push(ix,0);push(ix,H2-1);}
    for(let iy=0;iy<H2;iy++){push(0,iy);push(W2-1,iy);}
    while(st.length){const k=st.pop(),px=k%W2,py=(k/W2)|0;push(px+1,py);push(px-1,py);push(px,py+1);push(px,py-1);}}
  let x0=W2,y0=H2,x1=0,y1=0,any=false;
  for(let iy=0;iy<H2;iy++)for(let ix=0;ix<W2;ix++){if(p[(iy*W2+ix)*4+3]>16){any=true;
    if(ix<x0)x0=ix;if(ix>x1)x1=ix;if(iy<y0)y0=iy;if(iy>y1)y1=iy;}}
  if(!any){x0=0;y0=0;x1=W2-1;y1=H2-1;}
  x.putImageData(d,0,0);const cw=x1-x0+1,ch=y1-y0+1,o=document.createElement("canvas");
  o.width=cw;o.height=ch;o.getContext("2d").drawImage(c,x0,y0,cw,ch,0,0,cw,ch);
  return{canvas:o,asp:cw/ch};}

function drawSubOn(g,i){const r=samp(RATIO,i),yp=yprog(i),u=i/(NF-1),fp=smoothstep(FALL_START,1,u);
  const px=(START[0]+(HOLE[0]-START[0])*yp)*W, py=(START[1]+(HOLE[1]-START[1])*yp)*H;
  const base=SIZE*H*r, bw=base*subAsp, bh=base;
  const rz=2*Math.PI*SPINS*fp, sy=Math.cos(PITCH*fp), sx=Math.cos(YAW*Math.sin(fp*2*Math.PI));
  const bright=0.12+0.88*clamp((r-0.05)/0.95), amul=1-smoothstep(0.90,1,u);
  if(amul<=0||base<0.6)return;
  g.save();g.globalAlpha=amul;g.filter="brightness("+bright.toFixed(3)+")";g.imageSmoothingEnabled=true;
  g.translate(px,py);g.rotate(rz);g.scale(sx,sy);g.drawImage(sub,-bw/2,-bh/2,bw,bh);g.restore();}

function paintBase(g){if(bgReady){g.drawImage(bg,0,0,W,H);}else{g.fillStyle="#0f0b1a";g.fillRect(0,0,W,H);}}
function renderFrame(idx){const i=Math.min(idx,NF-1);
  tctx.clearRect(0,0,W,H);paintBase(tctx);if(sub)drawSubOn(tctx,i);
  ctx.globalAlpha=1;ctx.drawImage(tmp,0,0);
  tctx.clearRect(0,0,W,H);paintBase(tctx);if(sub)drawSubOn(tctx,Math.min(i+0.5,NF-1));
  ctx.globalAlpha=0.5;ctx.drawImage(tmp,0,0);ctx.globalAlpha=1;}

function frameCount(){return NF+HOLD;}
function loop(now){if(playing){const dur=frameCount()/FPS,tt=((now-t0)/1000)%dur;
  renderFrame(Math.floor(tt*FPS));}requestAnimationFrame(loop);}

function loadImage(file){return new Promise(function(res,rej){const im=new Image();
  im.onload=function(){res(im);};im.onerror=rej;im.src=URL.createObjectURL(file);});}
function rawCut(im){var c=document.createElement("canvas");c.width=im.naturalWidth;c.height=im.naturalHeight;
  c.getContext("2d").drawImage(im,0,0);return{canvas:c,asp:c.width/c.height};}
function applySubject(im,name){lastImg=im;lastName=name;
  var cut=removeBg?cutout(im,45):rawCut(im);subAsp=cut.asp;sub=cut.canvas;
  $("thumb").style.backgroundImage="url("+cut.canvas.toDataURL()+")";
  $("subName").textContent=name;$("subName").style.color="";t0=performance.now();}
function loadFile(file){loadImage(file).then(function(im){applySubject(im,file.name);});}
function nameFromUrl(u){var p=u.split("?")[0].split("#")[0].split("/").filter(Boolean).pop();return p||"linked image";}
function linkFail(){$("linkrow").classList.add("err");$("subName").textContent="couldn't load that link";
  $("subName").style.color="var(--warn)";setTimeout(function(){$("linkrow").classList.remove("err");},1400);}
function loadUrl(raw){raw=(raw||"").trim();if(!raw)return;$("subName").textContent="loading...";$("subName").style.color="";
  var im=new Image();im.crossOrigin="anonymous";
  im.onload=function(){applySubject(im,nameFromUrl(raw));};
  im.onerror=function(){var im2=new Image();im2.crossOrigin="anonymous";
    im2.onload=function(){applySubject(im2,nameFromUrl(raw));};
    im2.onerror=function(){linkFail();};
    im2.src="https://images.weserv.nl/?url="+encodeURIComponent(raw.replace(/^https?:\/\//,""));};
  im.src=raw;}

function exportGif(){if(!sub){flash($("drop"));return;}
  const btn=$("export");btn.disabled=true;btn.textContent="Rendering...";
  const bar=$("bar"),fill=$("barFill");bar.style.display="block";fill.style.width="0";
  const wasPlaying=playing;playing=false;
  const total=frameCount(),frames=[];let i=0;
  function grab(){if(i<total){renderFrame(i);
      frames.push(new Uint8Array(ctx.getImageData(0,0,W,H).data));
      fill.style.width=Math.round((i+1)/total*60)+"%";i++;setTimeout(grab,0);return;}
    btn.textContent="Encoding..";
    setTimeout(function(){const gif=encodeGIF(W,H,frames,50);fill.style.width="100%";
      const blob=new Blob([gif],{type:"image/gif"}),u=URL.createObjectURL(blob),a=document.createElement("a");
      a.href=u;a.download="pitfall.gif";a.click();URL.revokeObjectURL(u);
      btn.disabled=false;btn.textContent="Export GIF";bar.style.display="none";
      playing=wasPlaying;t0=performance.now();},30);}
  grab();}

function flash(el){el.classList.add("hot");setTimeout(function(){el.classList.remove("hot");},600);}
function bindDrop(zone,input,handler){zone.addEventListener("dragover",function(e){e.preventDefault();
  zone.classList.add("hot");});
  zone.addEventListener("dragleave",function(){zone.classList.remove("hot");});
  zone.addEventListener("drop",function(e){e.preventDefault();zone.classList.remove("hot");
    const f=e.dataTransfer.files[0];if(f)handler(f);});
  input.addEventListener("change",function(e){const f=e.target.files[0];if(f)handler(f);});}

bindDrop($("drop"),$("file"),loadFile);
$("cut").addEventListener("change",function(e){removeBg=e.target.checked;if(lastImg)applySubject(lastImg,lastName);});
$("link").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();loadUrl($("link").value);}});
window.addEventListener("paste",function(e){if(!e.clipboardData)return;var it=e.clipboardData.items||[];
  for(var i=0;i<it.length;i++){if(it[i].type.indexOf("image")===0){var f=it[i].getAsFile();if(f){loadFile(f);e.preventDefault();return;}}}});
$("export").addEventListener("click",exportGif);
requestAnimationFrame(loop);



</script>
